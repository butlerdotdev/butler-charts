# Butler Addon Definitions Configuration
# =======================================

# =============================================================================
# Butler Platform Configuration
# =============================================================================
config:
  # -- Enable ButlerConfig resource creation
  enabled: true

  multiTenancy:
    # -- Multi-tenancy mode
    # Disabled: All clusters in butler-tenants, no teams
    # Optional: Teams available but not required (recommended for getting started)
    # Enforced: All clusters must belong to a team
    mode: Optional

  # -- Default namespace for TenantClusters when not using teams
  defaultNamespace: butler-tenants

  # -- Default provider config reference (optional)
  # defaultProviderConfigRef: harvester

  # -- Default resource limits for new teams (optional)
  # defaultTeamLimits:
  #   maxClusters: 10
  #   maxWorkersPerCluster: 10
  #   maxTotalCPU: "100"
  #   maxTotalMemory: "200Gi"

  # -- Default addon versions (optional)
  # defaultAddonVersions:
  #   cilium: "1.17.0"
  #   metallb: "0.14.9"

  # -- Default NTP servers for Talos worker nodes (optional).
  # Used as fallback if a TenantCluster or ProviderConfig doesn't
  # specify time servers explicitly. Leave unset to fall through
  # to pool.ntp.org (which may not be reachable in restricted
  # networks).
  # defaultTimeServers:
  #   - ntp.example.com

  # -- Observability pipeline and collection defaults (optional).
  # When observability values are declared here, this chart owns the
  # ButlerConfig.spec.observability fields. Changes made via the
  # butler-console UI or butler-server API will appear to succeed but
  # will be reverted at the next Helm reconcile (default 10min).
  # For UI-driven workflows, leave this block commented out.
  #
  # observability:
  #   pipeline:
  #     clusterRef:
  #       name: obs-pipeline-prd
  #       namespace: platform-engineering
  #     logEndpoint: "http://vector-aggregator.vector.svc:8080"
  #     metricEndpoint: "http://victoria-metrics.monitoring.svc:8480/insert/0/prometheus/api/v1/write"
  #     traceEndpoint: "http://tempo.tracing.svc:4317"
  #   collection:
  #     autoEnroll:
  #       vectorAgent: true
  #       prometheus: false
  #       otelCollector: false
  #     logs:
  #       podLogs: true
  #       journald: false
  #       kubernetesEvents: false
  #     metrics:
  #       enabled: false
  #       retention: "15d"

  # Bootstrap Platform Admin User
  # Creates a User CRD so the admin appears in the Users page
  bootstrapAdmin:
    # -- Enable bootstrap admin User CRD creation
    enabled: true
    # -- Username (also used as CRD name)
    username: admin
    # -- Email address for the admin
    email: admin@localhost
    # -- Display name shown in UI
    displayName: Platform Administrator

    # Reference to the Secret containing the password hash
    # This should match the secret created by butler-console chart
    passwordSecretRef:
      # -- Secret name (default matches butler-console chart output)
      name: butler-console-admin
      # -- Secret namespace (should match where butler-console is installed)
      namespace: butler-system
      # -- Key in secret containing the bcrypt hash
      key: password-hash

# =============================================================================
# Platform Addons - Core Infrastructure Components
# =============================================================================
# These are essential for cluster operation
platform:
  enabled: true

  # Individual platform addons can be disabled
  addons:
    cilium:
      enabled: true
    longhorn:
      enabled: true
    metallb:
      enabled: true
    certManager:
      enabled: true
    traefik:
      enabled: true
    metricsServer:
      enabled: true

# =============================================================================
# Optional Addons - Observability, Security, and Utilities
# =============================================================================
# These enhance cluster capabilities but aren't required
optional:
  enabled: true

  # Individual optional addons can be disabled
  addons:
    # Observability
    prometheus:
      enabled: true
    vectorAgent:
      enabled: true
    vectorAggregator:
      enabled: true
    victoriaMetrics:
      enabled: true

    # Logging
    loki:
      enabled: true
    victoriaLogs:
      enabled: true

    otelCollector:
      enabled: true

    # Tracing
    tempo:
      enabled: true
    jaeger:
      enabled: true

    # Backup
    velero:
      enabled: true

    # DNS
    externalDns:
      enabled: true

    # Security
    externalSecrets:
      enabled: true
    sealedSecrets:
      enabled: true

    # Service Mesh
    istio:
      enabled: true
    linkerd:
      enabled: true

    # Database
    cnpg:
      enabled: true
    redis:
      enabled: true

    # Messaging
    nats:
      enabled: true
    rabbitmq:
      enabled: true

    argocd:
      enabled: true

    flux:
      enabled: true
