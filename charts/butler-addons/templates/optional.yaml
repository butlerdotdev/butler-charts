# =============================================================================
# Butler Built-in AddonDefinitions - Optional Addons
# These can be installed by users after cluster creation
# =============================================================================
{{- if .Values.optional.enabled }}
---
# =============================================================================
# Observability
# =============================================================================
{{- if .Values.optional.addons.prometheus.enabled }}
apiVersion: butler.butlerlabs.dev/v1alpha1
kind: AddonDefinition
metadata:
  name: prometheus-operator
  labels:
    butler.butlerlabs.dev/source: builtin
    butler.butlerlabs.dev/category: observability
    {{- include "butler-addons.labels" . | nindent 4 }}
spec:
  displayName: Prometheus Operator
  description: Full monitoring stack with Prometheus, Alertmanager, and Grafana dashboards
  category: observability
  icon: "🔥"
  iconData: ""
  platform: false
  tier: infrastructure
  chart:
    repository: https://prometheus-community.github.io/helm-charts
    name: kube-prometheus-stack
    defaultVersion: "65.8.1"
    availableVersions:
      - "65.8.1"
      - "65.5.0"
      - "64.0.0"
  defaults:
    namespace: monitoring
    releaseName: prometheus
    createNamespace: true
    timeout: "15m"
    values:
      prometheus:
        prometheusSpec:
          retention: 15d
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          storageSpec:
            volumeClaimTemplate:
              spec:
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 50Gi
      grafana:
        enabled: true
        adminPassword: butler-admin
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
      alertmanager:
        enabled: true
        alertmanagerSpec:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
  links:
    documentation: https://prometheus-operator.dev
    source: https://github.com/prometheus-operator/prometheus-operator
    homepage: https://prometheus.io
---
{{- end }}
{{- if .Values.optional.addons.vectorAgent.enabled }}
apiVersion: butler.butlerlabs.dev/v1alpha1
kind: AddonDefinition
metadata:
  name: vector-agent
  labels:
    butler.butlerlabs.dev/source: builtin
    butler.butlerlabs.dev/category: observability
    {{- include "butler-addons.labels" . | nindent 4 }}
spec:
  displayName: Vector Agent
  description: Lightweight log and metric collector for shipping data to a centralized pipeline
  category: observability
  icon: "📡"
  iconData: ""
  platform: false
  chart:
    repository: https://helm.vector.dev
    name: vector
    defaultVersion: "0.37.1"
    availableVersions:
      - "0.37.1"
      - "0.36.0"
      - "0.35.0"
  defaults:
    namespace: vector
    releaseName: vector-agent
    createNamespace: true
    timeout: "10m"
    values:
      role: Agent
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      customConfig:
        data_dir: /vector-data-dir
        api:
          enabled: true
          address: "127.0.0.1:8686"
          playground: false
        sources:
          kubernetes_logs:
            type: kubernetes_logs
          journald:
            type: journald
          internal_metrics:
            type: internal_metrics
        sinks:
          aggregator:
            type: vector
            inputs:
              - kubernetes_logs
              - journald
            address: "AGGREGATOR_ENDPOINT:6000"
  links:
    documentation: https://vector.dev/docs
    source: https://github.com/vectordotdev/vector
    homepage: https://vector.dev
---
{{- end }}
{{- if .Values.optional.addons.vectorAggregator.enabled }}
apiVersion: butler.butlerlabs.dev/v1alpha1
kind: AddonDefinition
metadata:
  name: vector-aggregator
  labels:
    butler.butlerlabs.dev/source: builtin
    butler.butlerlabs.dev/category: observability
    {{- include "butler-addons.labels" . | nindent 4 }}
spec:
  displayName: Vector Aggregator
  description: Centralized log and metric aggregation service for the observability pipeline
  category: observability
  icon: "📊"
  iconData: ""
  platform: false
  chart:
    repository: https://helm.vector.dev
    name: vector
    defaultVersion: "0.37.1"
    availableVersions:
      - "0.37.1"
      - "0.36.0"
      - "0.35.0"
  defaults:
    namespace: vector
    releaseName: vector-aggregator
    createNamespace: true
    timeout: "10m"
    values:
      role: Aggregator
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      customConfig:
        data_dir: /vector-data-dir
        api:
          enabled: true
          address: "0.0.0.0:8686"
          playground: false
        sources:
          vector_agents:
            type: vector
            address: "0.0.0.0:6000"
            version: "2"
        sinks:
          stdout:
            type: console
            inputs:
              - vector_agents
            encoding:
              codec: json
      service:
        enabled: true
        type: ClusterIP
        ports:
          - name: vector
            port: 6000
            protocol: TCP
            targetPort: 6000
  links:
    documentation: https://vector.dev/docs
    source: https://github.com/vectordotdev/vector
    homepage: https://vector.dev
---
{{- end }}
