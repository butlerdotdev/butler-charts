{{- if .Values.optional.addons.otelCollector.enabled }}
apiVersion: butler.butlerlabs.dev/v1alpha1
kind: AddonDefinition
metadata:
  name: otel-collector
  labels:
    butler.butlerlabs.dev/source: builtin
    butler.butlerlabs.dev/category: observability
    {{- include "butler-addons.labels" . | nindent 4 }}
spec:
  displayName: OpenTelemetry Collector
  description: Vendor-neutral telemetry agent for collecting traces, metrics, and logs via OTLP
  category: observability
  icon: "🔭"
  iconData: ""
  platform: false
  chart:
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    name: opentelemetry-collector
    defaultVersion: "0.108.0"
    availableVersions:
      - "0.108.0"
      - "0.104.0"
      - "0.100.0"
  defaults:
    namespace: otel
    releaseName: otel-collector
    createNamespace: true
    timeout: "10m"
    values:
      mode: daemonset
      image:
        repository: otel/opentelemetry-collector-contrib
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      presets:
        kubernetesAttributes:
          enabled: true
      config:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: "0.0.0.0:4317"
              http:
                endpoint: "0.0.0.0:4318"
        processors:
          batch:
            timeout: 5s
            send_batch_size: 1024
          memory_limiter:
            check_interval: 5s
            limit_mib: 256
        exporters:
          otlp:
            endpoint: "TRACE_ENDPOINT:4317"
            tls:
              insecure: true
        service:
          pipelines:
            traces:
              receivers: [otlp]
              processors: [memory_limiter, batch]
              exporters: [otlp]
  links:
    documentation: https://opentelemetry.io/docs/collector
    source: https://github.com/open-telemetry/opentelemetry-collector
    homepage: https://opentelemetry.io
---
{{- end }}
