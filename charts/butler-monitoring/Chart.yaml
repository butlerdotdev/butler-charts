apiVersion: v2
name: butler-monitoring
description: Substrate health monitoring for Butler management clusters
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.28.0-0"

keywords:
  - butler
  - kubernetes
  - monitoring
  - prometheus
  - substrate-health
  - etcd

home: https://butlerlabs.dev
sources:
  - https://github.com/butlerdotdev/butler-charts

maintainers:
  - name: Butler Labs
    email: founder@butlerlabs.dev
    url: https://butlerlabs.dev

dependencies:
  - name: kube-prometheus-stack
    version: "65.8.1"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled

annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: Apache-2.0
  artifacthub.io/prerelease: "true"
