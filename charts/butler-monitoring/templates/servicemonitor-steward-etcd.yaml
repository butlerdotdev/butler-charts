{{- if .Values.substrates.stewardEtcd.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "butler-monitoring.fullname" . }}-steward-etcd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "butler-monitoring.labels" . | nindent 4 }}
spec:
  # Steward etcd exposes unauthenticated metrics over HTTP on port 2381.
  # The client service (<release>-etcd-client) exposes both the client port
  # (2379, mTLS) and the metrics port (2381, plain HTTP). Only the metrics
  # port is scraped here.
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.substrates.stewardEtcd.interval }}
      scrapeTimeout: {{ .Values.substrates.stewardEtcd.scrapeTimeout }}
      relabelings:
        - targetLabel: substrate
          replacement: steward-etcd
      metricRelabelings:
        - action: keep
          sourceLabels: [__name__]
          regex: etcd_server_has_leader|etcd_server_leader_changes_seen_total|etcd_server_proposals_failed_total|etcd_server_proposals_committed_total|etcd_server_proposals_applied_total|etcd_server_proposals_pending|etcd_mvcc_db_total_size_in_bytes|etcd_disk_wal_fsync_duration_seconds_bucket|etcd_disk_backend_commit_duration_seconds_bucket|etcd_network_peer_sent_failures_total|etcd_network_peer_received_failures_total|process_resident_memory_bytes|process_cpu_seconds_total|grpc_server_handled_total
  selector:
    matchLabels:
      {{- if .Values.substrates.stewardEtcd.matchLabels }}
      {{- toYaml .Values.substrates.stewardEtcd.matchLabels | nindent 6 }}
      {{- else }}
      prometheus.io/metrics: "true"
      {{- end }}
  namespaceSelector:
    matchNames:
      - {{ .Values.substrates.stewardEtcd.namespace }}
{{- end }}
