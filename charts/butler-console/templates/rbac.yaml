{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "butler-console.fullname" . }}
  labels:
    {{- include "butler-console.labels" . | nindent 4 }}
rules:
  # Core resources - read for dashboard views
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  
  # Secrets - read for kubeconfig/credentials, create/update/patch/delete for rotation
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Terminal access requires exec
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  
  # Butler CRDs - full access for management operations
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["tenantclusters", "tenantaddons", "teams", "butlerconfigs", "providerconfigs", "identityproviders"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["tenantclusters/status", "tenantaddons/status", "teams/status", "identityproviders/status"]
    verbs: ["get"]
  
  # User CRD - full access for user management
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["users"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["users/status"]
    verbs: ["get", "update", "patch"]
  
  # ManagementAddon - full CRUD for management cluster addons
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["managementaddons"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["managementaddons/status"]
    verbs: ["get"]
  
  # Workspace and WorkspaceTemplate - full CRUD for workspace management
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["workspaces", "workspacetemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["workspaces/status", "workspacetemplates/status"]
    verbs: ["get", "update", "patch"]

  # NetworkPool and IPAllocation - for network management UI
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["networkpools", "ipallocations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["networkpools/status", "ipallocations/status"]
    verbs: ["get"]

  # ImageSync - for image synchronization management
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["imagesyncs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["imagesyncs/status"]
    verbs: ["get"]

  # LoadBalancerRequest - read for cloud bootstrap status
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["loadbalancerrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["loadbalancerrequests/status"]
    verbs: ["get"]

  # AddonDefinition - read for catalog display
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["addondefinitions"]
    verbs: ["get", "list", "watch"]
  
  # Cluster API resources - read for status display
  - apiGroups: ["cluster.x-k8s.io"]
    resources: ["clusters", "machines", "machinedeployments"]
    verbs: ["get", "list", "watch"]
  
  # Steward TenantControlPlane - read for status, patch for rotation tracking annotations
  - apiGroups: ["steward.butlerlabs.dev"]
    resources: ["tenantcontrolplanes"]
    verbs: ["get", "list", "watch", "patch"]

  # Impersonation for butler-server's apiserver-mutation path (ADR-010).
  # The server forwards the authenticated end-user's identity to the
  # apiserver so admission webhooks on Team and TenantCluster (ADR-009)
  # observe the real caller for platform-admin / team-admin gates and
  # creator-email annotation identity matching. Scoped to the fixed
  # "butler-api-users" group the server always sends plus the user
  # itself.
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "butler-console.fullname" . }}
  labels:
    {{- include "butler-console.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "butler-console.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "butler-console.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Role for restarting Steward deployment during certificate rotation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "butler-console.fullname" . }}-steward-restart
  namespace: steward-system
  labels:
    {{- include "butler-console.labels" . | nindent 4 }}
rules:
  # Allow patching Steward deployment to trigger rollout restart
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["steward"]
    verbs: ["get", "patch"]
{{- if .Values.server.cliAuth.enabled }}
---
# CLI device flow authentication requires managing ServiceAccounts and RBAC.
# The server creates per-user SAs with team-scoped RoleBindings when users
# authenticate via the device flow. This ClusterRole grants the server
# permission to create/manage those SAs and bindings, and holds all
# Butler CRD permissions that the CLI ClusterRoles can grant (required by
# Kubernetes RBAC escalation prevention).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "butler-console.fullname" . }}-cli-auth
  labels:
    {{- include "butler-console.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts", "serviceaccounts/token"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings", "clusterrolebindings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["butler.butlerlabs.dev"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces", "secrets", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "butler-console.fullname" . }}-cli-auth
  labels:
    {{- include "butler-console.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "butler-console.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "butler-console.fullname" . }}-cli-auth
  apiGroup: rbac.authorization.k8s.io
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "butler-console.fullname" . }}-steward-restart
  namespace: steward-system
  labels:
    {{- include "butler-console.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "butler-console.fullname" . }}-steward-restart
subjects:
  - kind: ServiceAccount
    name: {{ include "butler-console.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
---
# butler-api-users (ADR-010): the synthetic group butler-server
# attaches to Impersonate-Group on every user-mutation call. Binding
# the baseline RBAC users need to this group gives every
# butler-server-impersonated caller enough apiserver access to
# perform webhook-gated mutations, while the Butler admission webhook
# still enforces fine-grained authorization (team admin vs operator
# vs viewer) on the specific fields.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: butler-api-users
  labels:
    {{- include "butler-console.labels" . | nindent 4 }}
rules:
  - apiGroups: ["butler.butlerlabs.dev"]
    resources:
      - teams
      - tenantclusters
      - tenantaddons
      - providerconfigs
      - workspaces
      - workspacetemplates
      - ipallocations
      - networkpools
      - identityproviders
      - users
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces", "secrets", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: butler-api-users
  labels:
    {{- include "butler-console.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: butler-api-users
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: butler-api-users
